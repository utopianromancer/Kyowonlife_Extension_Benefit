<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교원라이프 만기연장 프리미엄 혜택</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="text-gray-800 antialiased relative pb-10">

    <!-- Header Section -->
    <header class="bg-white px-5 pt-12 pb-8 rounded-b-[2.5rem] shadow-sm relative z-10">
        <div class="flex justify-center mb-6">
            <div class="h-10 flex items-center justify-center">
                <span class="text-2xl font-black tracking-tighter text-[#1E2E45]">KYOWON<span class="text-[#FF6600] ml-1">LIFE</span></span>
            </div>
        </div>
        
        <div class="text-center">
            <span class="inline-block bg-[#FFF0E6] text-[#FF6600] text-xs font-bold px-3 py-1 rounded-full mb-3 tracking-wider">
                VIP EXCLUSIVE
            </span>
            <h1 class="text-2xl font-bold leading-tight text-[#1E2E45]">
                베스트라이프 교원 VIP를 위한<br>
                <span class="text-[#FF6600]">만기연장 프리미엄 혜택</span>
            </h1>
            <p class="mt-3 text-sm text-gray-500">
                고객님의 소중한 자산, 더 큰 혜택으로 이어가세요.
            </p>
        </div>
    </header>

    <!-- Main Content (Gift List) -->
    <main class="px-5 mt-[-20px] pt-12 z-0 relative" id="gift-list-container">
        <!-- 데이터를 불러오는 중 표시 -->
        <div id="loading" class="text-center py-10 text-gray-400 text-sm">
            혜택 리스트를 불러오는 중입니다...
        </div>
    </main>

    <!-- Modal (상세 이미지 통으로 보여주기) -->
    <div id="modal" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-3xl h-[85vh] flex flex-col transform translate-y-full transition-transform duration-300" id="modal-content">
            
            <!-- 모달 헤더 (닫기 버튼 등) -->
            <div class="flex justify-between items-center p-5 border-b border-gray-100">
                <h3 class="font-bold text-lg text-[#1E2E45]">상세 정보</h3>
                <button onclick="closeModal()" class="p-2 bg-gray-100 rounded-full text-gray-500 active:bg-gray-200">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- 모달 콘텐츠 (통 이미지 스크롤 영역) -->
            <div class="flex-1 overflow-y-auto w-full relative bg-gray-50">
                <img id="modal-image" src="" alt="상세 이미지" class="w-full h-auto block">
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v9 모듈 방식) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // =====================================================================
        // 고객님이 첨부해주신 실제 Firebase 키 값 적용 완료
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDhElnMJlCdFYsyX1vQgP7XAdhsK9ccNAU",
            authDomain: "kyowonlife-extension-benefit.firebaseapp.com",
            projectId: "kyowonlife-extension-benefit",
            storageBucket: "kyowonlife-extension-benefit.firebasestorage.app",
            messagingSenderId: "127835300688",
            appId: "1:127835300688:web:fa82a57e52dd6df4c58255",
            measurementId: "G-7Q0K8XR18D"
        };
        // =====================================================================

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase 초기화 에러: ", e);
        }

        // 임시 데이터 (파이어베이스에 데이터가 아직 없을 때 보여질 화면)
        const mockGifts = [
            {
                id: '1',
                title: '장수워셔블카본매트',
                subtitle: '올뉴블랙 에디션 SS (JMA-1055)',
                badgeText: '4년 연장시 제공',
                imageUrl: 'https://images.unsplash.com/photo-1505693314120-0d443867891c?q=80&w=800&auto=format&fit=crop',
                detailImageUrl: 'https://images.unsplash.com/photo-1505693314120-0d443867891c?q=80&w=800&auto=format&fit=crop'
            },
            {
                id: '2',
                title: '다이슨 에어랩 멀티 스타일러',
                subtitle: '컴플리트 롱 (빈카블루/로제)',
                badgeText: '5년 연장시 제공',
                imageUrl: 'https://images.unsplash.com/photo-1522337660859-02fbefca4702?q=80&w=800&auto=format&fit=crop',
                detailImageUrl: 'https://images.unsplash.com/photo-1522337660859-02fbefca4702?q=80&w=800&auto=format&fit=crop'
            }
        ];

        // 데이터 렌더링 함수
        function renderGifts(gifts) {
            const container = document.getElementById('gift-list-container');
            container.innerHTML = ''; // 로딩 텍스트 제거

            gifts.forEach(gift => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-3xl p-5 mb-6 relative overflow-hidden';
                
                const badgeHtml = gift.badgeText 
                    ? `<div class="absolute top-4 left-4 z-10 bg-[#FF6600] text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md">${gift.badgeText}</div>` 
                    : '';

                card.innerHTML = `
                    ${badgeHtml}
                    <div class="text-center mb-4 mt-2">
                        <h2 class="text-xl font-extrabold text-[#1E2E45]">${gift.title}</h2>
                        <p class="text-sm text-gray-500 font-medium mt-1">${gift.subtitle}</p>
                    </div>

                    <div class="w-full aspect-square rounded-2xl overflow-hidden bg-white shadow-inner relative cursor-pointer" onclick="openModal('${gift.detailImageUrl}')">
                        <img src="${gift.imageUrl}" alt="${gift.title}" class="w-full h-full object-cover">
                    </div>

                    <button onclick="openModal('${gift.detailImageUrl}')" class="w-full mt-5 bg-[#1E2E45] text-white py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 active:bg-gray-800 transition-colors">
                        상세정보 보기
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // 데이터 가져오기
        async function fetchGifts() {
            if (db) {
                try {
                    const querySnapshot = await getDocs(collection(db, "gifts"));
                    const giftsData = [];
                    querySnapshot.forEach((doc) => {
                        giftsData.push({ id: doc.id, ...doc.data() });
                    });
                    
                    if(giftsData.length > 0) {
                        renderGifts(giftsData); // 실제 데이터 노출
                    } else {
                        renderGifts(mockGifts); // 데이터가 비어있으면 임시 화면 노출
                    }
                } catch (error) {
                    console.error("Firebase 데이터 로드 에러:", error);
                    renderGifts(mockGifts);
                }
            }
        }

        window.addEventListener('DOMContentLoaded', fetchGifts);
    </script>

    <!-- UI Interaction Scripts (Modal) -->
    <script>
        lucide.createIcons();

        function openModal(detailUrl) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            const modalImage = document.getElementById('modal-image');
            
            modalImage.src = detailUrl;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('translate-y-full');
            }, 10);
            
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('translate-y-full');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }
    </script>
</body>
</html>
