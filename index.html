<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교원라이프 만기연장 프리미엄 혜택</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8f9fa; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 이미지 화질 최적화 */
        .crisp-image {
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0);
        }
    </style>
</head>
<body class="text-gray-800 antialiased relative pb-10">

    <!-- Header Section -->
    <header class="bg-white px-5 pt-12 pb-8 rounded-b-[2.5rem] shadow-sm relative z-10">
        <!-- 1. 로고 이미지 영역 (하드코딩 텍스트 -> 이미지 파일로 변경) -->
        <div class="flex justify-center mb-6">
            <div class="h-10 flex items-center justify-center">
                <img src="./교원라이프_CI.png" alt="교원라이프 로고" class="h-7 object-contain">
            </div>
        </div>
        
        <div class="text-center">
            <span class="inline-block bg-[#FFF0E6] text-[#FF6600] text-xs font-bold px-3 py-1 rounded-full mb-3 tracking-wider">
                VIP EXCLUSIVE
            </span>
            <h1 class="text-2xl font-bold leading-tight text-[#1E2E45]">
                베스트라이프 교원 VIP를 위한<br>
                <span class="text-[#FF6600]">만기연장 프리미엄 혜택</span>
            </h1>
            <p class="mt-3 text-sm text-gray-500">
                고객님의 소중한 자산, 더 큰 혜택으로 이어가세요.
            </p>
        </div>
    </header>

    <!-- Main Content (Gift List) -->
    <main class="px-5 mt-[-20px] pt-12 z-0 relative" id="gift-list-container">
        <div id="loading" class="text-center py-10 text-gray-400 text-sm">
            혜택 리스트를 불러오는 중입니다...
        </div>
    </main>

    <!-- Modal (상세 이미지 꽉 차게 보여주기) -->
    <div id="modal" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
        <!-- 모달 높이를 85vh에서 90vh로 늘려 화면에 더 꽉 차게 수정 -->
        <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-3xl h-[90vh] flex flex-col transform translate-y-full transition-transform duration-300" id="modal-content">
            
            <div class="flex justify-between items-center p-5 border-b border-gray-100 shadow-sm z-10 bg-white rounded-t-3xl">
                <h3 class="font-bold text-lg text-[#1E2E45]">상세 정보</h3>
                <button onclick="closeModal()" class="p-2 bg-gray-50 rounded-full text-gray-500 active:bg-gray-200">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- 3. 상세 이미지 화질 개선 및 꽉 차게 렌더링 -->
            <div class="flex-1 overflow-y-auto w-full relative bg-white no-scrollbar">
                <img id="modal-image" src="" alt="상세 이미지" class="w-full h-auto block crisp-image">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // =====================================================================
        // 스크린샷에서 추출한 실제 파이어베이스 키 값을 적용했습니다!
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDhElnMJlCdFYsyX1vQgP7XAdhsK9ccNAU",
            authDomain: "kyowonlife-extension-benefit.firebaseapp.com",
            projectId: "kyowonlife-extension-benefit",
            storageBucket: "kyowonlife-extension-benefit.firebasestorage.app",
            messagingSenderId: "127835300688",
            appId: "1:127835300688:web:fa82a57e52dd6df4c58255"
        };
        // =====================================================================

        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase 초기화 에러: ", e);
        }

        const mockGifts = [
            {
                id: '1',
                title: '파이어베이스 데이터 없음',
                subtitle: '콘솔에서 데이터를 추가해주세요.',
                badgeText: '데이터 확인 필요',
                imageUrl: 'https://placehold.co/600x600/e2e8f0/475569?text=Image',
                detailImageUrl: 'https://placehold.co/800x2000/e2e8f0/475569?text=Detail'
            }
        ];

        function renderGifts(gifts) {
            const container = document.getElementById('gift-list-container');
            container.innerHTML = ''; 

            gifts.forEach(gift => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-3xl p-5 mb-6 relative overflow-hidden';
                
                // 2. 뱃지 겹침 현상 해결: 뱃지를 텍스트 위로 올리고 흐름(flow)에 맞게 배치
                card.innerHTML = `
                    <div class="text-center mb-5 mt-1">
                        ${gift.badgeText ? `<div class="inline-block bg-[#FF6600] text-white text-[13px] font-bold px-3.5 py-1.5 rounded-full shadow-sm mb-3">${gift.badgeText}</div>` : ''}
                        <h2 class="text-[22px] font-extrabold text-[#1E2E45] leading-snug break-keep">${gift.title}</h2>
                        <p class="text-sm text-gray-500 font-medium mt-1.5">${gift.subtitle}</p>
                    </div>

                    <div class="w-full aspect-square rounded-2xl overflow-hidden bg-white border border-gray-100 relative cursor-pointer" onclick="openModal('${gift.detailImageUrl}')">
                        <img src="${gift.imageUrl}" alt="${gift.title}" class="w-full h-full object-cover crisp-image">
                    </div>

                    <button onclick="openModal('${gift.detailImageUrl}')" class="w-full mt-5 bg-[#1E2E45] text-white py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 active:bg-gray-800 transition-colors shadow-sm">
                        상세정보 보기
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        async function fetchGifts() {
            if (db) {
                try {
                    const q = query(collection(db, "gifts"), orderBy("order", "asc"));
                    const querySnapshot = await getDocs(q);
                    const giftsData = [];
                    querySnapshot.forEach((doc) => {
                        giftsData.push({ id: doc.id, ...doc.data() });
                    });
                    
                    if(giftsData.length > 0) {
                        renderGifts(giftsData);
                    } else {
                        // 파이어베이스는 연결되었으나 'gifts' 컬렉션에 문서가 없을 때
                        document.getElementById('loading').innerHTML = `
                            파이어베이스 연결 성공!<br>
                            이제 콘솔에서 'gifts' 컬렉션을 만들고 데이터를 추가해주세요.
                        `;
                    }
                } catch (error) {
                    console.error("데이터 로드 에러:", error);
                    document.getElementById('loading').innerHTML = `데이터 로드 실패. (데이터베이스 규칙 확인 또는 콘솔의 인덱스 생성 링크 클릭 필요)`;
                }
            }
        }

        window.addEventListener('DOMContentLoaded', fetchGifts);
    </script>

    <script>
        lucide.createIcons();

        function openModal(detailUrl) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            const modalImage = document.getElementById('modal-image');
            
            modalImage.src = detailUrl;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('translate-y-full');
            }, 10);
            
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('translate-y-full');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = ''; 
                document.getElementById('modal-image').src = ''; // 닫을 때 이미지 초기화
            }, 300);
        }
    </script>
</body>
</html>
