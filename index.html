<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>교원라이프 만기연장 프리미엄 혜택</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- iOS 느낌을 살리기 위한 세련된 폰트 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    
    <style>
        :root {
            --brand-color: #F37321; /* 교원라이프 오렌지 포인트 */
            --brand-dark: #1E2E45;  /* 교원라이프 네이비 */
            --bg-color: #F5F5F7;    /* iOS 스타일 배경색 */
        }
        
        body { 
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
            background-color: var(--bg-color); 
            -webkit-font-smoothing: antialiased;
            color: #1d1d1f;
        }

        /* iOS 스타일 바텀 시트 애니메이션 */
        @keyframes slideUpSheet {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .bottom-sheet { animation: slideUpSheet 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in-overlay { animation: fadeIn 0.3s ease-out forwards; }
        
        /* 스크롤바 숨기기 (깔끔한 UI용) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 세련된 그림자 효과 */
        .ios-shadow {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // 추후 어드민 구성 시 아래 주석을 해제하여 사용합니다.
        /*
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.firebaseDb = db;
        */
    </script>

    <script type="text/babel">
        // 사용자가 자유롭게 설정할 수 있는 뱃지 텍스트(badgeText) 추가
        const MOCK_GIFTS = [
            {
                id: 1,
                badgeText: "4년 연장시 제공", // 관리자가 마음대로 변경 가능
                title: "장수워셔블카본매트",
                subtitle: "올뉴블랙 에디션 SS (그레이 색상만 가능)",
                imageUrl: "https://placehold.co/600x600/e2e8f0/475569?text=Carbon+Mat+SS",
                detailImageUrl: "https://placehold.co/800x2000/e2e8f0/475569?text=Detailed+Info+Image+1" // 모달에 나올 상세 통이미지
            },
            {
                id: 2,
                badgeText: "인기 상품", // 연수 외에 다양한 텍스트 활용 가능
                title: "장수워셔블카본매트",
                subtitle: "퍼스트 에디션 Q (그레이 색상만 가능)",
                imageUrl: "https://placehold.co/600x600/e2e8f0/475569?text=Carbon+Mat+Q",
                detailImageUrl: "https://placehold.co/800x2500/e2e8f0/475569?text=Detailed+Info+Image+2"
            },
            {
                id: 3,
                badgeText: "2년 연장시 제공",
                title: "프리미엄 무선 청소기",
                subtitle: "화이트/블랙 중 선택 가능",
                imageUrl: "https://placehold.co/600x600/e2e8f0/475569?text=Vacuum+Cleaner",
                detailImageUrl: "https://placehold.co/800x2000/e2e8f0/475569?text=Detailed+Info+Image+3"
            }
        ];

        // 공통 아이콘 컴포넌트
        const Icons = {
            Close: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            ),
            ChevronRight: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            )
        };

        function App() {
            const [gifts, setGifts] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [selectedGift, setSelectedGift] = React.useState(null);
            
            // 추후 파이어베이스 연동 시 사용할 로고 URL 상태
            // null 일 경우 텍스트 기반의 플레이스홀더를 보여줍니다.
            const [logoUrl, setLogoUrl] = React.useState(null); 

            // 데이터 로드 이펙트
            React.useEffect(() => {
                const fetchData = async () => {
                    try {
                        if (window.firebaseDb) {
                            // TODO: 실제 Firebase 연동 시 사용될 코드
                            /*
                            import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
                            
                            // 1. 설정값 (로고 등) 가져오기
                            const configDoc = await getDoc(doc(window.firebaseDb, "config", "main"));
                            if (configDoc.exists()) setLogoUrl(configDoc.data().logoUrl);

                            // 2. 사은품 리스트 가져오기
                            const querySnapshot = await getDocs(collection(window.firebaseDb, "gifts"));
                            const fetchedGifts = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            // 정렬 등이 필요하다면 여기서 처리 후 세팅
                            setGifts(fetchedGifts);
                            */
                            setGifts(MOCK_GIFTS); // Fallback
                        } else {
                            // 테스트용 지연 효과 (0.5초)
                            setTimeout(() => {
                                setGifts(MOCK_GIFTS);
                                setLoading(false);
                            }, 500);
                        }
                    } catch (error) {
                        console.error("데이터를 불러오는데 실패했습니다.", error);
                        setGifts(MOCK_GIFTS);
                        setLoading(false);
                    }
                };

                fetchData();
                
                // 모달이 열려있을 때 배경 스크롤 방지
                if (selectedGift) document.body.style.overflow = 'hidden';
                else document.body.style.overflow = 'unset';
                
                return () => { document.body.style.overflow = 'unset'; };
            }, [selectedGift]);

            return (
                <div className="relative max-w-lg mx-auto bg-[#F5F5F7] min-h-screen pb-12">
                    
                    {/* 상단 GNB 영역 (스크롤 시 상단에 고정 및 블러 효과) */}
                    <header className="sticky top-0 z-30 bg-white/70 backdrop-blur-md border-b border-gray-200/50 flex justify-center items-center h-14 px-4 transition-all">
                        {logoUrl ? (
                            <img src={logoUrl} alt="로고" className="h-6 object-contain" />
                        ) : (
                            <div className="text-gray-400 text-sm font-medium tracking-wide flex items-center">
                                {/* Firebase에서 이미지 업로드 전 보여질 세련된 임시 영역 */}
                                <svg className="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                로고 이미지 영역
                            </div>
                        )}
                    </header>

                    {/* 모던한 헤더 텍스트 영역 (VIP 타겟으로 스마트하고 간결하게 변경) */}
                    <section className="px-6 pt-12 pb-8">
                        <div className="inline-block px-3 py-1 bg-orange-50 border border-orange-100 rounded-full text-[#F37321] text-xs font-bold tracking-wider mb-4 shadow-sm">
                            VIP EXCLUSIVE
                        </div>
                        <h1 className="text-[28px] font-bold text-gray-900 leading-snug tracking-tight mb-3">
                            베스트라이프 교원 VIP를 위한<br/><span className="text-[#F37321]">만기연장 프리미엄 혜택</span>
                        </h1>
                        <p className="text-gray-500 text-[15px] leading-relaxed">
                            추가 납입금 없이, 당신의 품격에 맞는<br/>특별한 사은품을 선택하세요.
                        </p>
                    </section>

                    {}
                    <section className="px-4 space-y-5 relative z-10">
                        {loading ? (
                            <div className="flex justify-center py-20">
                                <div className="animate-spin rounded-full h-8 w-8 border-2 border-gray-300 border-t-[#F37321]"></div>
                            </div>
                        ) : (
                            gifts.map(gift => (
                                <div 
                                    key={gift.id} 
                                    className="bg-white rounded-3xl p-5 ios-shadow cursor-pointer active:scale-[0.98] transition-transform duration-200"
                                    onClick={() => setSelectedGift(gift)}
                                >
                                    {/* 사은품명을 가장 상단 중앙에 배치 */}
                                    <div className="text-center mb-5 px-2">
                                        <h3 className="text-[22px] font-bold text-gray-900 leading-snug break-keep">
                                            {gift.title}
                                        </h3>
                                        <p className="text-[13px] text-gray-500 mt-1.5 font-medium">
                                            {gift.subtitle}
                                        </p>
                                    </div>

                                    {/* 이미지 및 뱃지 영역 */}
                                    <div className="relative w-full aspect-square bg-gray-50 rounded-2xl overflow-hidden mb-4 border border-gray-100">
                                        {/* 수정사항 반영: 뱃지 폰트 및 크기 확대, 오렌지 포인트 컬러 적용 */}
                                        {gift.badgeText && (
                                            <div className="absolute top-3 left-3 z-10 bg-[#F37321] text-white text-[13px] font-bold px-4 py-2 rounded-full shadow-md tracking-wide">
                                                {gift.badgeText}
                                            </div>
                                        )}
                                        <img 
                                            src={gift.imageUrl} 
                                            alt={gift.title} 
                                            className="w-full h-full object-cover mix-blend-multiply" 
                                        />
                                    </div>
                                    
                                    {/* 상세보기 버튼화 (기존 텍스트 링크 형태에서 명확한 버튼 형태로 변경, 프리미엄 네이비 적용) */}
                                    <button className="w-full bg-[#1E2E45] text-white hover:bg-gray-800 active:bg-black text-[14px] font-bold py-3.5 rounded-xl transition-colors flex justify-center items-center shadow-sm">
                                        상세정보 보기
                                    </button>
                                </div>
                            ))
                        )}
                    </section>

                    {}
                    {selectedGift && (
                        <div className="fixed inset-0 z-50 flex flex-col justify-end fade-in-overlay">
                            {/* 반투명 어두운 배경 */}
                            <div 
                                className="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"
                                onClick={() => setSelectedGift(null)}
                            ></div>
                            
                            {/* 모달 컨텐츠 (아래에서 위로 올라옴, 상세 이미지만 표시) */}
                            <div className="relative w-full max-w-lg mx-auto bg-white rounded-t-[32px] bottom-sheet h-[90vh] flex flex-col shadow-2xl overflow-hidden">
                                {/* 핸들 (드래그 바 느낌) */}
                                <div className="absolute top-0 left-0 right-0 flex justify-center pt-3 pb-4 bg-white/90 backdrop-blur-md z-20" onClick={() => setSelectedGift(null)}>
                                    <div className="w-12 h-1.5 bg-gray-300 rounded-full"></div>
                                </div>
                                
                                <button 
                                    onClick={() => setSelectedGift(null)}
                                    className="absolute top-4 right-4 p-2 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 transition-colors z-20 shadow-sm"
                                >
                                    <Icons.Close />
                                </button>
                                
                                {/* 텍스트 없이 통이미지만 스크롤 가능하게 노출 */}
                                <div className="flex-1 overflow-y-auto no-scrollbar pt-12">
                                    <img 
                                        src={selectedGift.detailImageUrl || selectedGift.imageUrl} 
                                        alt={selectedGift.title} 
                                        className="w-full h-auto block"
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
